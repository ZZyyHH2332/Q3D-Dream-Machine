<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Lattice -- 造梦晶格 · 潮玩霓虹</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            overflow: hidden;
            color: #f0f0f5;
        }
        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        /* Info panel */
        .info {
            position: fixed;
            top: 24px; left: 24px;
            z-index: 10;
        }
        .info h1 {
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 4px;
            color: #f0f0f5;
            margin-bottom: 4px;
        }
        .info h1 span { color: #00D4FF; font-weight: 500; }
        .info p {
            font-size: 13px;
            color: rgba(240,240,245,0.4);
            letter-spacing: 1px;
        }
        .info .particle-count {
            display: inline-block;
            margin-top: 8px;
            background: rgba(0,212,255,0.12);
            border: 1px solid rgba(0,212,255,0.2);
            border-radius: 999px;
            padding: 4px 14px;
            font-size: 0.75rem;
            color: #00D4FF;
        }

        /* Controls */
        .controls {
            position: fixed;
            bottom: 24px; right: 24px;
            z-index: 10;
            display: flex; gap: 8px;
            align-items: center;
        }
        .controls button {
            padding: 10px 20px;
            border: 1px solid rgba(0,212,255,0.25);
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(16px);
            color: rgba(240,240,245,0.7);
            border-radius: 14px;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        .controls button:hover {
            background: rgba(0,212,255,0.15);
            border-color: rgba(0,212,255,0.5);
            color: #00D4FF;
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0,212,255,0.15);
        }
        .controls button:active {
            transform: translateY(0);
        }

        /* Speed indicator */
        .speed-badge {
            position: fixed;
            bottom: 24px; left: 24px;
            z-index: 10;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 8px 16px;
            font-size: 0.78rem;
            color: rgba(240,240,245,0.5);
        }
        .speed-badge span { color: #00D4FF; font-weight: 600; }

        /* Pause overlay */
        .pause-overlay {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            background: rgba(0,212,255,0.1);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(0,212,255,0.2);
            border-radius: 20px;
            padding: 16px 32px;
            font-size: 1.1rem;
            color: #00D4FF;
            letter-spacing: 3px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .pause-overlay.show { opacity: 1; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div class="info">
        <h1>Dream <span>Lattice</span></h1>
        <p>造梦晶格 · 潮玩霓虹 · Generative Art</p>
        <div class="particle-count">120 particles · trendy</div>
    </div>

    <div class="speed-badge">Speed: <span id="speedLabel">1.0x</span></div>

    <div class="controls">
        <button onclick="togglePause()">暂停 / 继续</button>
        <button onclick="changeSpeed()">变速</button>
        <button onclick="resetParticles()">重置</button>
    </div>

    <div class="pause-overlay" id="pauseOverlay">PAUSED</div>

    <script>
        const PARTICLE_COUNT = 120;
        const COLORS = ["#00D4FF", "#FF6B6B", "#FFE66D", "#95E1D3", "#C9B1FF", "#60a5fa", "#bf5af2"];
        const CONNECT_DIST = 90;

        let particles = [];
        let paused = false;
        let currentSpeed = 1;
        const speedSteps = [0.3, 0.5, 1, 1.5, 2, 3];

        class Particle {
            constructor() {
                this.reset(true);
            }

            reset(initial = false) {
                this.x = Math.random() * windowWidth;
                this.y = initial ? Math.random() * windowHeight : windowHeight + 20;
                this.size = Math.random() * 5 + 2;
                this.speedY = (Math.random() * 1.5 + 0.3);
                this.speedX = (Math.random() - 0.5) * 0.4;
                this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
                this.alpha = Math.random() * 0.5 + 0.25;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = Math.random() * 0.02 + 0.008;
                this.pulsePhase = Math.random() * Math.PI * 2;
                this.pulseSpeed = Math.random() * 0.03 + 0.01;
            }

            update() {
                if (paused) return;
                this.y -= this.speedY * currentSpeed;
                this.wobble += this.wobbleSpeed * currentSpeed;
                this.x += Math.sin(this.wobble) * 0.4 + this.speedX * currentSpeed;
                this.pulsePhase += this.pulseSpeed * currentSpeed;

                if (this.y < -30) this.reset();
                if (this.x < -30) this.x = windowWidth + 30;
                if (this.x > windowWidth + 30) this.x = -30;
            }

            draw() {
                noStroke();
                const pulse = 1 + Math.sin(this.pulsePhase) * 0.2;
                const s = this.size * pulse;
                const a = Math.floor(this.alpha * 255).toString(16).padStart(2, '0');

                // Glow effect: draw a larger transparent circle first
                fill(this.color + Math.floor(this.alpha * 80).toString(16).padStart(2, '0'));
                ellipse(this.x, this.y, s * 2.5);

                // Core
                fill(this.color + a);
                ellipse(this.x, this.y, s);
            }
        }

        function setup() {
            const canvas = createCanvas(windowWidth, windowHeight);
            canvas.parent('canvas-container');

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push(new Particle());
            }
        }

        function draw() {
            // Semi-transparent background for trail effect
            background(15, 22, 46, 18);

            // Draw connection lines between nearby particles
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const d = Math.sqrt(dx * dx + dy * dy);
                    if (d < CONNECT_DIST) {
                        const lineAlpha = map(d, 0, CONNECT_DIST, 40, 0);
                        const hexAlpha = Math.floor(lineAlpha).toString(16).padStart(2, '0');
                        stroke(particles[i].color + hexAlpha);
                        strokeWeight(0.6);
                        line(particles[i].x, particles[i].y, particles[j].x, particles[j].y);
                    }
                }
            }

            // Update and draw particles
            noStroke();
            for (const p of particles) {
                p.update();
                p.draw();
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }

        // ===== Control Functions =====
        function togglePause() {
            paused = !paused;
            document.getElementById('pauseOverlay').classList.toggle('show', paused);
        }

        function changeSpeed() {
            const idx = speedSteps.indexOf(currentSpeed);
            currentSpeed = speedSteps[(idx + 1) % speedSteps.length];
            document.getElementById('speedLabel').textContent = currentSpeed + 'x';
        }

        function resetParticles() {
            particles = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push(new Particle());
            }
        }

        // ===== Keyboard shortcuts =====
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') { e.preventDefault(); togglePause(); }
            if (e.code === 'KeyS') changeSpeed();
            if (e.code === 'KeyR') resetParticles();
        });
    </script>
</body>
</html>
