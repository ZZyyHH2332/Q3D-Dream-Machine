<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Q3D 桌面宠物</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
      overflow: hidden;
      background: transparent;
    }

    /* Floating Pet */
    #pet-container {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 140px;
      height: 180px;
      cursor: grab;
      z-index: 999999;
      user-select: none;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    #pet-container:active { cursor: grabbing; }
    #pet-container.dragging { transition: none; }

    .pet-body {
      width: 100%;
      height: 100%;
      position: relative;
      animation: petFloat 3s ease-in-out infinite;
    }
    @keyframes petFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .pet-head {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin: 0 auto;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(255,143,171,0.3);
      background: #FF8FAB;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pet-head img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .pet-head svg {
      width: 70%;
      height: 70%;
    }

    .pet-bubble {
      position: absolute;
      top: -40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(8px);
      padding: 8px 14px;
      border-radius: 16px;
      font-size: 13px;
      color: #4A4A6A;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .pet-bubble.show { opacity: 1; }
    .pet-bubble::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      border-width: 6px 6px 0;
      border-style: solid;
      border-color: rgba(255,255,255,0.9) transparent transparent;
    }

    /* Chat Panel */
    #chat-panel {
      position: fixed;
      bottom: 220px;
      right: 30px;
      width: 320px;
      max-height: 450px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(16px);
      border-radius: 20px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.12);
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 999998;
      border: 1px solid rgba(255,143,171,0.15);
    }
    #chat-panel.open { display: flex; }

    .chat-header {
      padding: 14px 18px;
      background: linear-gradient(135deg, #FF8FAB, #FFB7C5);
      color: white;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .chat-header .close-btn {
      margin-left: auto;
      cursor: pointer;
      opacity: 0.8;
      font-size: 18px;
    }
    .chat-header .close-btn:hover { opacity: 1; }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 300px;
    }
    .chat-msg {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 13px;
      line-height: 1.5;
      word-break: break-word;
    }
    .chat-msg.user {
      align-self: flex-end;
      background: #FF8FAB;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .chat-msg.pet {
      align-self: flex-start;
      background: #F0F4F8;
      color: #4A4A6A;
      border-bottom-left-radius: 4px;
    }
    .chat-msg.typing::after {
      content: '...';
      animation: typing 1.2s infinite;
    }
    @keyframes typing {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    .chat-input-area {
      padding: 10px 14px;
      border-top: 1px solid rgba(0,0,0,0.06);
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .chat-input {
      flex: 1;
      border: none;
      background: #F7F8FA;
      padding: 10px 14px;
      border-radius: 20px;
      font-size: 13px;
      outline: none;
      color: #4A4A6A;
    }
    .chat-input::placeholder { color: #B0B0C0; }
    .chat-send {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #FF8FAB, #FFB7C5);
      border: none;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .chat-send:hover { opacity: 0.9; }
    .chat-send:disabled { opacity: 0.5; cursor: not-allowed; }

    .chat-actions {
      padding: 0 14px 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .chat-action-btn {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 12px;
      border: 1px solid rgba(255,143,171,0.3);
      background: rgba(255,143,171,0.08);
      color: #FF8FAB;
      cursor: pointer;
      text-decoration: none;
    }
    .chat-action-btn:hover { background: rgba(255,143,171,0.15); }

    /* Context Menu */
    #context-menu {
      position: fixed;
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      padding: 6px 0;
      display: none;
      z-index: 1000000;
      min-width: 140px;
    }
    #context-menu.show { display: block; }
    .ctx-item {
      padding: 10px 16px;
      font-size: 13px;
      color: #4A4A6A;
      cursor: pointer;
      transition: background 0.15s;
    }
    .ctx-item:hover { background: #FFF5F7; }

    /* Spin animation */
    .spinning { animation: spin 0.6s ease-in-out; }
    @keyframes spin {
      0% { transform: rotate(0deg) scale(1); }
      50% { transform: rotate(180deg) scale(1.2); }
      100% { transform: rotate(360deg) scale(1); }
    }
  </style>
</head>
<body>
  <!-- Pet -->
  <div id="pet-container">
    <div class="pet-bubble" id="pet-bubble">你好呀~</div>
    <div class="pet-body" id="pet-body">
      <div class="pet-head" id="pet-head">
        <!-- Avatar or default SVG -->
      </div>
    </div>
  </div>

  <!-- Chat Panel -->
  <div id="chat-panel">
    <div class="chat-header">
      <span>🐱</span>
      <span id="pet-name">小Q</span>
      <span class="close-btn" id="chat-close">&times;</span>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-actions">
      <a class="chat-action-btn" href="solo-cn://open" target="_blank">🚀 TRAE 深度对话</a>
      <button class="chat-action-btn" id="btn-pip">🔝 置顶桌面</button>
    </div>
    <div class="chat-input-area">
      <input type="text" class="chat-input" id="chat-input" placeholder="和宠物聊聊天...">
      <button class="chat-send" id="chat-send">➤</button>
    </div>
  </div>

  <!-- Context Menu -->
  <div id="context-menu">
    <div class="ctx-item" id="ctx-hide">隐藏宠物</div>
    <div class="ctx-item" id="ctx-pip">置顶到桌面</div>
    <div class="ctx-item" id="ctx-close-panel">关闭对话</div>
  </div>

  <script>
    // Config from URL params
    const params = new URLSearchParams(location.search);
    const avatarPath = params.get('avatar') || './avatar.png';
    const personality = params.get('personality') || '活泼可爱';
    const apiKey = params.get('apiKey') || '';
    const apiBase = params.get('apiBase') || 'https://api.openai.com/v1';
    const petName = params.get('name') || '小Q';

    document.getElementById('pet-name').textContent = petName;

    // Setup avatar
    const headEl = document.getElementById('pet-head');
    if (avatarPath) {
      headEl.innerHTML = `<img src="${avatarPath}" alt="avatar">`;
    } else {
      headEl.innerHTML = `
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="45" fill="#FF8FAB"/>
          <circle cx="35" cy="42" r="6" fill="#4A4A6A"/>
          <circle cx="65" cy="42" r="6" fill="#4A4A6A"/>
          <ellipse cx="50" cy="58" rx="8" ry="5" fill="#4A4A6A"/>
          <circle cx="28" cy="55" r="5" fill="#FFB7C5" opacity="0.5"/>
          <circle cx="72" cy="55" r="5" fill="#FFB7C5" opacity="0.5"/>
        </svg>`;
    }

    // Chat state
    const messages = [];
    let isTyping = false;

    function addMessage(text, sender) {
      const container = document.getElementById('chat-messages');
      const msg = document.createElement('div');
      msg.className = `chat-msg ${sender}`;
      msg.textContent = text;
      container.appendChild(msg);
      container.scrollTop = container.scrollHeight;
      messages.push({ role: sender === 'user' ? 'user' : 'assistant', content: text });
    }

    function showTyping() {
      const container = document.getElementById('chat-messages');
      const msg = document.createElement('div');
      msg.className = 'chat-msg pet typing';
      msg.id = 'typing-msg';
      msg.textContent = '思考中';
      container.appendChild(msg);
      container.scrollTop = container.scrollHeight;
      isTyping = true;
    }

    function hideTyping() {
      const el = document.getElementById('typing-msg');
      if (el) el.remove();
      isTyping = false;
    }

    async function sendChat(userText) {
      if (!userText.trim() || isTyping) return;
      addMessage(userText, 'user');

      const input = document.getElementById('chat-input');
      input.value = '';
      showTyping();

      // Try API call if key is available
      if (apiKey) {
        try {
          const systemPrompt = `你是 Q3D 形象造梦机的桌面宠物，一个${personality}的 Q 版虚拟角色。你的名字是${petName}。回答要简短活泼，带适当的 emoji，每次回复不超过 80 字。`;
          const msgs = [{ role: 'system', content: systemPrompt }, ...messages.slice(-10)];

          const res = await fetch(`${apiBase}/chat/completions`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify({
              model: 'gpt-4o-mini',
              messages: msgs,
              max_tokens: 150,
              temperature: 0.8
            })
          });

          if (!res.ok) throw new Error('API error');
          const data = await res.json();
          const reply = data.choices?.[0]?.message?.content || '嗯...我想想~ 🤔';
          hideTyping();
          typewriterReply(reply);
        } catch (e) {
          hideTyping();
          fallbackReply(userText);
        }
      } else {
        setTimeout(() => {
          hideTyping();
          fallbackReply(userText);
        }, 800);
      }
    }

    function fallbackReply(userText) {
      const text = userText.toLowerCase();
      const replies = [
        { keywords: ['你好', 'hi', 'hello'], reply: '你好呀！我是你的专属宠物 ' + petName + '~ 🎉' },
        { keywords: ['名字', '叫'], reply: '我叫 ' + petName + '，是你的 Q 版形象宠物哦~ 🐱' },
        { keywords: ['做什么', '功能'], reply: '我可以陪你聊天，还能帮你介绍 Q3D 的功能呢~ 🎨' },
        { keywords: ['可爱', '好看', '漂亮'], reply: '谢谢夸奖！你也很可爱呢~ 💕' },
        { keywords: [' joke', '笑话'], reply: '为什么程序员总是分不清圣诞节和万圣节？因为 Oct 31 == Dec 25！😄' },
        { keywords: ['bye', '再见', '拜拜'], reply: '再见啦！记得常来找我玩哦~ 👋' },
      ];
      for (const r of replies) {
        if (r.keywords.some(k => text.includes(k))) {
          typewriterReply(r.reply);
          return;
        }
      }
      typewriterReply('哇，这个话题好有趣！可以多跟我说说吗~ ✨');
    }

    function typewriterReply(text) {
      const container = document.getElementById('chat-messages');
      const msg = document.createElement('div');
      msg.className = 'chat-msg pet';
      container.appendChild(msg);

      let i = 0;
      const interval = setInterval(() => {
        msg.textContent = text.slice(0, i + 1);
        container.scrollTop = container.scrollHeight;
        i++;
        if (i >= text.length) {
          clearInterval(interval);
          messages.push({ role: 'assistant', content: text });
        }
      }, 30);
    }

    // Event listeners
    document.getElementById('chat-send').addEventListener('click', () => {
      sendChat(document.getElementById('chat-input').value);
    });
    document.getElementById('chat-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendChat(e.target.value);
    });
    document.getElementById('chat-close').addEventListener('click', () => {
      document.getElementById('chat-panel').classList.remove('open');
    });

    // Pet interactions
    const petContainer = document.getElementById('pet-container');
    const petBody = document.getElementById('pet-body');

    petContainer.addEventListener('click', () => {
      document.getElementById('chat-panel').classList.toggle('open');
    });

    petContainer.addEventListener('dblclick', () => {
      petBody.classList.add('spinning');
      setTimeout(() => petBody.classList.remove('spinning'), 600);
      showBubble('旋转跳跃我闭着眼~ 🎵');
    });

    function showBubble(text) {
      const bubble = document.getElementById('pet-bubble');
      bubble.textContent = text;
      bubble.classList.add('show');
      setTimeout(() => bubble.classList.remove('show'), 3000);
    }

    // Show greeting bubble on load
    setTimeout(() => showBubble(`你好呀，我是${petName}~`), 500);

    // Drag
    let isDragging = false, dragOffsetX = 0, dragOffsetY = 0;
    petContainer.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      isDragging = true;
      dragOffsetX = e.clientX - petContainer.offsetLeft;
      dragOffsetY = e.clientY - petContainer.offsetTop;
      petContainer.classList.add('dragging');
    });
    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      petContainer.style.left = (e.clientX - dragOffsetX) + 'px';
      petContainer.style.top = (e.clientY - dragOffsetY) + 'px';
      petContainer.style.bottom = 'auto';
      petContainer.style.right = 'auto';
    });
    document.addEventListener('mouseup', () => {
      isDragging = false;
      petContainer.classList.remove('dragging');
    });

    // Context menu
    const ctxMenu = document.getElementById('context-menu');
    petContainer.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      ctxMenu.style.left = e.clientX + 'px';
      ctxMenu.style.top = e.clientY + 'px';
      ctxMenu.classList.add('show');
    });
    document.addEventListener('click', () => ctxMenu.classList.remove('show'));

    document.getElementById('ctx-hide').addEventListener('click', () => {
      petContainer.style.display = 'none';
      document.getElementById('chat-panel').classList.remove('open');
    });
    document.getElementById('ctx-close-panel').addEventListener('click', () => {
      document.getElementById('chat-panel').classList.remove('open');
    });

    // PiP
    document.getElementById('btn-pip').addEventListener('click', enablePiP);
    document.getElementById('ctx-pip').addEventListener('click', enablePiP);

    async function enablePiP() {
      if ('documentPictureInPicture' in window) {
        try {
          const pipWindow = await documentPictureInPicture.requestWindow({
            width: 200,
            height: 280,
          });
          // Clone pet into PiP window
          const clone = petContainer.cloneNode(true);
          clone.style.position = 'static';
          clone.style.bottom = 'auto';
          clone.style.right = 'auto';
          pipWindow.document.body.appendChild(clone);
          pipWindow.document.body.style.background = 'transparent';
          pipWindow.document.body.style.margin = '0';
          // Copy styles
          const styles = document.querySelectorAll('style');
          styles.forEach(s => {
            const ns = pipWindow.document.createElement('style');
            ns.textContent = s.textContent;
            pipWindow.document.head.appendChild(ns);
          });
        } catch (e) {
          alert('PiP 置顶需要 Chrome/Edge 116+');
        }
      } else {
        alert('你的浏览器不支持 Document PiP，请使用 Chrome/Edge 116+');
      }
    }
  </script>
</body>
</html>
