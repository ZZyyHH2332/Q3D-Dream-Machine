<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q3D Dream Machine - 心情控制 & 宠物养成</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, #0a0e1a 0%, #16213e 50%, #0f3460 100%);
  color: #f0f0f5;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ---- Glass Card ---- */
.glass {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 24px;
}

/* ---- Header ---- */
.page-header {
  text-align: center;
  padding: 28px 20px 12px;
}
.page-header h1 {
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(90deg, #60a5fa, #00D4FF, #FF69B4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 4px;
}
.page-header p {
  font-size: 14px;
  color: rgba(240,240,245,0.5);
}

/* ---- Main Layout ---- */
.main-container {
  display: flex;
  gap: 24px;
  padding: 16px 28px 28px;
  max-width: 1400px;
  margin: 0 auto;
}
.panel {
  flex: 1;
  min-width: 0;
}
.panel-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 2px;
}
.panel-subtitle {
  font-size: 13px;
  color: rgba(240,240,245,0.5);
  margin-bottom: 20px;
}

/* ---- Mood Grid ---- */
.mood-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}
.mood-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 14px 8px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.04);
  cursor: pointer;
  transition: all 0.3s ease;
  user-select: none;
}
.mood-btn:hover {
  background: rgba(255,255,255,0.1);
  transform: translateY(-2px);
}
.mood-btn .emoji {
  font-size: 28px;
  line-height: 1;
}
.mood-btn .name {
  font-size: 13px;
  font-weight: 600;
}
.mood-btn .anim-id {
  font-size: 10px;
  color: rgba(240,240,245,0.35);
  font-family: monospace;
}
.mood-btn.selected {
  border-color: var(--mood-color);
  box-shadow: 0 0 16px var(--mood-color), 0 0 40px color-mix(in srgb, var(--mood-color) 30%, transparent);
  background: rgba(255,255,255,0.08);
}

/* ---- Mood Status ---- */
.mood-status {
  text-align: center;
  padding: 16px;
}
.mood-status .label {
  font-size: 12px;
  color: rgba(240,240,245,0.4);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.mood-status .current-mood {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 4px;
}
.mood-status .desc {
  font-size: 13px;
  color: rgba(240,240,245,0.6);
}

/* ---- Pet Section ---- */
.pet-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
}
.pet-avatar {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid rgba(96,165,250,0.4);
  box-shadow: 0 0 20px rgba(96,165,250,0.2);
  flex-shrink: 0;
}
.pet-info h3 {
  font-size: 20px;
  font-weight: 700;
  color: #60a5fa;
}
.pet-info .personality {
  font-size: 13px;
  color: rgba(240,240,245,0.5);
}

/* ---- Level ---- */
.level-section {
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.level-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 48px;
  height: 48px;
  border-radius: 12px;
  background: linear-gradient(135deg, #60a5fa, #00D4FF);
  font-size: 15px;
  font-weight: 700;
  color: #0a0e1a;
  flex-shrink: 0;
}
.xp-bar-wrapper {
  flex: 1;
}
.xp-label {
  font-size: 12px;
  color: rgba(240,240,245,0.5);
  margin-bottom: 4px;
  display: flex;
  justify-content: space-between;
}
.xp-track {
  height: 10px;
  border-radius: 5px;
  background: rgba(255,255,255,0.08);
  overflow: hidden;
}
.xp-fill {
  height: 100%;
  border-radius: 5px;
  background: linear-gradient(90deg, #60a5fa, #00D4FF);
  transition: width 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
  width: 0%;
}

/* ---- Status Bars ---- */
.stat-list {
  margin-bottom: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.stat-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.stat-icon {
  font-size: 16px;
  flex-shrink: 0;
  width: 22px;
  text-align: center;
}
.stat-label {
  font-size: 13px;
  font-weight: 500;
  width: 52px;
  flex-shrink: 0;
}
.stat-bar-track {
  flex: 1;
  height: 8px;
  border-radius: 4px;
  background: rgba(255,255,255,0.08);
  overflow: hidden;
}
.stat-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
  width: 0%;
}
.stat-value {
  font-size: 12px;
  color: rgba(240,240,245,0.6);
  width: 48px;
  text-align: right;
  flex-shrink: 0;
}

/* ---- Action Buttons ---- */
.action-section {
  margin-bottom: 20px;
}
.action-row-label {
  font-size: 12px;
  font-weight: 600;
  color: rgba(240,240,245,0.5);
  margin-bottom: 8px;
  margin-top: 12px;
}
.action-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.action-btn {
  flex: 1;
  min-width: 90px;
  padding: 10px 8px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
  color: #f0f0f5;
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.25s ease;
  text-align: center;
  line-height: 1.3;
}
.action-btn:hover {
  background: rgba(255,255,255,0.12);
  transform: translateY(-1px);
}
.action-btn:active {
  transform: translateY(0);
}
.action-btn .effect {
  display: block;
  font-size: 10px;
  color: rgba(240,240,245,0.4);
  font-weight: 400;
  margin-top: 2px;
}
.action-btn.feed-btn:hover { border-color: #FF9800; box-shadow: 0 0 12px rgba(255,152,0,0.3); }
.action-btn.play-btn:hover { border-color: #4CAF50; box-shadow: 0 0 12px rgba(76,175,80,0.3); }

/* ---- Name & Personality ---- */
.settings-row {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
  align-items: center;
}
.settings-row input[type="text"],
.settings-row select {
  flex: 1;
  padding: 8px 12px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.06);
  color: #f0f0f5;
  font-size: 13px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}
.settings-row input[type="text"]:focus,
.settings-row select:focus {
  border-color: #60a5fa;
}
.settings-row select option {
  background: #16213e;
  color: #f0f0f5;
}

/* ---- Operation Log ---- */
.op-log {
  max-height: 120px;
  overflow-y: auto;
  border-radius: 10px;
  background: rgba(0,0,0,0.25);
  padding: 10px 12px;
  font-size: 12px;
  line-height: 1.7;
  color: rgba(240,240,245,0.65);
}
.op-log::-webkit-scrollbar {
  width: 4px;
}
.op-log::-webkit-scrollbar-track {
  background: transparent;
}
.op-log::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.15);
  border-radius: 2px;
}
.log-entry {
  padding: 2px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  animation: fadeIn 0.3s ease;
}
.log-entry:last-child { border-bottom: none; }
.log-time {
  color: rgba(240,240,245,0.3);
  margin-right: 6px;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ---- Toast ---- */
.toast-container {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  pointer-events: none;
}
.toast {
  padding: 10px 24px;
  border-radius: 12px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.15);
  font-size: 14px;
  font-weight: 600;
  color: #f0f0f5;
  animation: toastIn 0.3s ease, toastOut 0.3s ease 1.7s forwards;
  white-space: nowrap;
}
.toast.level-up {
  background: linear-gradient(135deg, rgba(96,165,250,0.25), rgba(0,212,255,0.25));
  border-color: rgba(0,212,255,0.3);
  box-shadow: 0 0 30px rgba(0,212,255,0.2);
}
.toast.warning {
  background: linear-gradient(135deg, rgba(255,107,107,0.25), rgba(255,152,0,0.25));
  border-color: rgba(255,107,107,0.3);
  box-shadow: 0 0 30px rgba(255,107,107,0.2);
}

@keyframes toastIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes toastOut {
  from { opacity: 1; transform: translateY(0); }
  to { opacity: 0; transform: translateY(16px); }
}

/* ---- Responsive ---- */
@media (max-width: 900px) {
  .main-container {
    flex-direction: column;
    padding: 12px 16px 20px;
  }
  .mood-grid {
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
}
</style>
</head>
<body>

<!-- Header -->
<div class="page-header">
  <h1>Q3D Dream Machine</h1>
  <p>心情控制 & 宠物养成 演示面板</p>
</div>

<!-- Main Layout -->
<div class="main-container">

  <!-- ========== LEFT PANEL: Mood Control ========== -->
  <div class="panel">
    <div class="glass">
      <div class="panel-title">心情控制</div>
      <div class="panel-subtitle">9 种心情 / 行为动画</div>

      <div class="mood-grid" id="moodGrid">
        <!-- 9 mood buttons rendered by JS -->
      </div>

      <div class="mood-status glass" id="moodStatus">
        <div class="label">当前心情</div>
        <div class="current-mood" id="currentMoodName">未选择</div>
        <div class="desc" id="currentMoodDesc">点击上方按钮选择一种心情动画</div>
      </div>
    </div>
  </div>

  <!-- ========== RIGHT PANEL: Pet Care ========== -->
  <div class="panel">
    <div class="glass">
      <div class="panel-title">宠物养成</div>
      <div class="panel-subtitle">200 级好感度系统</div>

      <!-- Pet Avatar -->
      <div class="pet-header">
        <img class="pet-avatar" src="./q3d-avatar-kawaii.jpg" alt="小Q">
        <div class="pet-info">
          <h3 id="petName">小Q</h3>
          <div class="personality" id="petPersonality">性格: 友好</div>
        </div>
      </div>

      <!-- Level -->
      <div class="level-section">
        <div class="level-badge" id="levelBadge">Lv.1</div>
        <div class="xp-bar-wrapper">
          <div class="xp-label">
            <span>经验值</span>
            <span id="xpText">0 / 50 XP</span>
          </div>
          <div class="xp-track">
            <div class="xp-fill" id="xpFill"></div>
          </div>
        </div>
      </div>

      <!-- Status Bars -->
      <div class="stat-list" id="statList">
        <!-- Rendered by JS -->
      </div>

      <!-- Action Buttons -->
      <div class="action-section">
        <div class="action-row-label">喂食</div>
        <div class="action-row" id="feedRow"></div>

        <div class="action-row-label">玩耍</div>
        <div class="action-row" id="playRow"></div>
      </div>

      <!-- Settings -->
      <div class="settings-row">
        <input type="text" id="renameInput" placeholder="输入新名字..." maxlength="8">
        <button class="action-btn" style="min-width:70px; flex:none;" onclick="renamePet()">改名</button>
        <select id="personalitySelect" onchange="changePersonality(this.value)">
          <option value="友好" selected>友好</option>
          <option value="调皮">调皮</option>
          <option value="慵懒">慵懒</option>
          <option value="害羞">害羞</option>
        </select>
      </div>

      <!-- Operation Log -->
      <div class="op-log" id="opLog">
        <div class="log-entry" style="color:rgba(240,240,245,0.35);">等待操作...</div>
      </div>
    </div>
  </div>

</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ===================== MOOD CONTROL =====================
const moods = [
  { emoji: '😌', name: '平静', anim: 'idle',          color: '#60a5fa', desc: '安静待机，轻微呼吸动画' },
  { emoji: '😄', name: '开心', anim: 'happy',          color: '#FFD700', desc: '蹦蹦跳跳，尾巴摇摆' },
  { emoji: '🤩', name: '兴奋', anim: 'excited',       color: '#FF6B6B', desc: '快速奔跑，大幅摇摆' },
  { emoji: '😴', name: '困倦', anim: 'sleeping',      color: '#9B9B9B', desc: '闭眼打盹，Zzz 气泡' },
  { emoji: '🤔', name: '好奇', anim: 'curious',       color: '#B19CD9', desc: '歪头观察，耳朵竖起' },
  { emoji: '😢', name: '难过', anim: 'sad',           color: '#6B7FD7', desc: '低头垂耳，缓慢移动' },
  { emoji: '🥰', name: '喜爱', anim: 'love',          color: '#FF69B4', desc: '扑抱主人，爱心粒子' },
  { emoji: '🧗', name: '攀爬', anim: 'climbing',      color: '#4CAF50', desc: '向上攀爬，爪子动作' },
  { emoji: '🙃', name: '倒挂', anim: 'crawling_upside', color: '#FF9800', desc: '倒挂爬行，搞笑姿态' },
];

let selectedMood = null;

function renderMoods() {
  const grid = document.getElementById('moodGrid');
  grid.innerHTML = '';
  moods.forEach((m, i) => {
    const btn = document.createElement('div');
    btn.className = 'mood-btn';
    btn.style.setProperty('--mood-color', m.color);
    btn.innerHTML = `
      <span class="emoji">${m.emoji}</span>
      <span class="name" style="color:${m.color}">${m.name}</span>
      <span class="anim-id">${m.anim}</span>
    `;
    btn.addEventListener('click', () => selectMood(i));
    grid.appendChild(btn);
  });
}

function selectMood(index) {
  const m = moods[index];
  selectedMood = m;
  // Update button states
  document.querySelectorAll('.mood-btn').forEach((btn, i) => {
    btn.classList.toggle('selected', i === index);
  });
  // Update status
  document.getElementById('currentMoodName').textContent = m.emoji + ' ' + m.name;
  document.getElementById('currentMoodName').style.color = m.color;
  document.getElementById('currentMoodDesc').textContent = m.desc + ' [' + m.anim + ']';
  // Log
  addLog('🎭 心情切换 → ' + m.name + ' (' + m.anim + ')');
}

// ===================== PET CARE SYSTEM =====================
const pet = {
  name: '小Q',
  personality: '友好',
  level: 1,
  xp: 15,
  stats: {
    affection:   { icon: '❤️', label: '好感度', value: 50, max: 100, gradient: 'linear-gradient(90deg, #FF69B4, #FF1493)' },
    hunger:      { icon: '🍖', label: '饱食度', value: 70, max: 100, gradient: 'linear-gradient(90deg, #FF9800, #FF5722)' },
    energy:      { icon: '⚡', label: '精力值', value: 85, max: 100, gradient: 'linear-gradient(90deg, #FFD700, #FFC107)' },
    clean:       { icon: '🧼', label: '清洁度', value: 60, max: 100, gradient: 'linear-gradient(90deg, #60a5fa, #007AFF)' },
    happiness:   { icon: '😊', label: '快乐值', value: 75, max: 100, gradient: 'linear-gradient(90deg, #4CAF50, #8BC34A)' },
  }
};

const feedActions = [
  { name: '小食', emoji: '🍎', hunger: 10, xp: 5 },
  { name: '正餐', emoji: '🍲', hunger: 30, xp: 8 },
  { name: '甜点', emoji: '🧁', hunger: 15, xp: 6 },
];

const playActions = [
  { name: '玩球',   emoji: '🎾', happiness: 15, energyCost: 10, xp: 10 },
  { name: '追逐',   emoji: '🪁', happiness: 20, energyCost: 20, xp: 12 },
  { name: '解谜',   emoji: '🧩', happiness: 10, energyCost: 5,  xp: 8  },
];

function renderStats() {
  const list = document.getElementById('statList');
  list.innerHTML = '';
  Object.values(pet.stats).forEach(s => {
    const pct = Math.min(100, (s.value / s.max) * 100);
    list.innerHTML += `
      <div class="stat-row">
        <span class="stat-icon">${s.icon}</span>
        <span class="stat-label">${s.label}</span>
        <div class="stat-bar-track">
          <div class="stat-bar-fill" data-stat="${s.label}" style="background:${s.gradient}; width:${pct}%"></div>
        </div>
        <span class="stat-value" data-stat-val="${s.label}">${s.value}/${s.max}</span>
      </div>
    `;
  });
}

function updateStatBar(statKey) {
  const s = pet.stats[statKey];
  const pct = Math.min(100, (s.value / s.max) * 100);
  const fill = document.querySelector(`.stat-bar-fill[data-stat="${s.label}"]`);
  const valEl = document.querySelector(`.stat-stat-val[data-stat-val="${s.label}"]`);
  if (fill) fill.style.width = pct + '%';
  // Re-render value text by finding in stat-value
  document.querySelectorAll('.stat-value').forEach(el => {
    if (el.dataset.statVal === s.label) {
      el.textContent = s.value + '/' + s.max;
    }
  });
}

function renderActionButtons() {
  const feedRow = document.getElementById('feedRow');
  feedRow.innerHTML = '';
  feedActions.forEach(a => {
    const btn = document.createElement('button');
    btn.className = 'action-btn feed-btn';
    btn.innerHTML = `${a.emoji} ${a.name}<span class="effect">+${a.hunger}饱食</span>`;
    btn.addEventListener('click', () => doFeed(a));
    feedRow.appendChild(btn);
  });

  const playRow = document.getElementById('playRow');
  playRow.innerHTML = '';
  playActions.forEach(a => {
    const btn = document.createElement('button');
    btn.className = 'action-btn play-btn';
    btn.innerHTML = `${a.emoji} ${a.name}<span class="effect">+${a.happiness}快乐 -${a.energyCost}精力</span>`;
    btn.addEventListener('click', () => doPlay(a));
    playRow.appendChild(btn);
  });
}

function clamp(val, min, max) {
  return Math.max(min, Math.min(max, val));
}

function doFeed(action) {
  pet.stats.hunger.value = clamp(pet.stats.hunger.value + action.hunger, 0, 100);
  addXP(action.xp);
  addLog(`${action.emoji} 喂食${action.name} → 饱食度+${action.hunger}, 经验+${action.xp}`);
  renderStats();
  updateXPDisplay();
}

function doPlay(action) {
  if (pet.stats.energy.value < 10) {
    showToast('太累了，让它休息一下吧！', 'warning');
    return;
  }
  pet.stats.happiness.value = clamp(pet.stats.happiness.value + action.happiness, 0, 100);
  pet.stats.energy.value = clamp(pet.stats.energy.value - action.energyCost, 0, 100);
  addXP(action.xp);
  addLog(`${action.emoji} ${action.name} → 快乐值+${action.happiness}, 精力-${action.energyCost}, 经验+${action.xp}`);
  renderStats();
  updateXPDisplay();
}

function addXP(amount) {
  pet.xp += amount;
  const threshold = pet.level * 50;
  if (pet.xp >= threshold) {
    pet.xp -= threshold;
    pet.level++;
    showToast(`升级！当前 Lv.${pet.level}`, 'level-up');
    addLog(`⬆️ 升级！当前 Lv.${pet.level}`);
  }
  updateXPDisplay();
}

function updateXPDisplay() {
  const threshold = pet.level * 50;
  const pct = Math.min(100, (pet.xp / threshold) * 100);
  document.getElementById('xpFill').style.width = pct + '%';
  document.getElementById('xpText').textContent = pet.xp + ' / ' + threshold + ' XP';
  document.getElementById('levelBadge').textContent = 'Lv.' + pet.level;
}

// ===================== SETTINGS =====================
function renamePet() {
  const input = document.getElementById('renameInput');
  const newName = input.value.trim();
  if (!newName) return;
  pet.name = newName;
  document.getElementById('petName').textContent = newName;
  input.value = '';
  addLog('✏️ 改名 → ' + newName);
}

function changePersonality(val) {
  pet.personality = val;
  document.getElementById('petPersonality').textContent = '性格: ' + val;
  addLog('🔄 性格变更 → ' + val);
}

// Handle rename on Enter
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('renameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') renamePet();
  });
});

// ===================== OPERATION LOG =====================
function addLog(text) {
  const log = document.getElementById('opLog');
  // Remove placeholder
  const placeholder = log.querySelector('div[style]');
  if (placeholder && placeholder.textContent === '等待操作...') {
    log.innerHTML = '';
  }
  const now = new Date();
  const time = now.getHours().toString().padStart(2, '0') + ':' +
               now.getMinutes().toString().padStart(2, '0') + ':' +
               now.getSeconds().toString().padStart(2, '0');
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `<span class="log-time">[${time}]</span>${text}`;
  log.insertBefore(entry, log.firstChild);
  // Keep max 50 entries
  while (log.children.length > 50) {
    log.removeChild(log.lastChild);
  }
  log.scrollTop = 0;
}

// ===================== TOAST =====================
function showToast(message, type) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast' + (type ? ' ' + type : '');
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => {
    if (toast.parentNode) toast.parentNode.removeChild(toast);
  }, 2000);
}

// ===================== INIT =====================
renderMoods();
renderStats();
updateXPDisplay();
renderActionButtons();
</script>
