<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Q3D 桌面宠物</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
      overflow: hidden;
      background: transparent;
    }

    /* Floating Pet */
    #pet-container {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 140px;
      height: 180px;
      cursor: grab;
      z-index: 999999;
      user-select: none;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    #pet-container:active { cursor: grabbing; }
    #pet-container.dragging { transition: none; }

    .pet-body {
      width: 100%;
      height: 100%;
      position: relative;
      animation: petFloat 3s ease-in-out infinite;
    }
    @keyframes petFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .pet-head {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin: 0 auto;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(255,143,171,0.3);
      background: #FF8FAB;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pet-head img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .pet-head svg {
      width: 70%;
      height: 70%;
    }

    .pet-bubble {
      position: absolute;
      top: -40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(8px);
      padding: 8px 14px;
      border-radius: 16px;
      font-size: 13px;
      color: #4A4A6A;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .pet-bubble.show { opacity: 1; }
    .pet-bubble::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      border-width: 6px 6px 0;
      border-style: solid;
      border-color: rgba(255,255,255,0.9) transparent transparent;
    }

    /* Chat Panel */
    #chat-panel {
      position: fixed;
      bottom: 220px;
      right: 30px;
      width: 320px;
      max-height: 450px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(16px);
      border-radius: 20px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.12);
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 999998;
      border: 1px solid rgba(255,143,171,0.15);
    }
    #chat-panel.open { display: flex; }

    .chat-header {
      padding: 14px 18px;
      background: linear-gradient(135deg, #FF8FAB, #FFB7C5);
      color: white;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .chat-header .close-btn {
      margin-left: auto;
      cursor: pointer;
      opacity: 0.8;
      font-size: 18px;
    }
    .chat-header .close-btn:hover { opacity: 1; }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 300px;
    }
    .chat-msg {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 13px;
      line-height: 1.5;
      word-break: break-word;
    }
    .chat-msg.user {
      align-self: flex-end;
      background: #FF8FAB;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .chat-msg.pet {
      align-self: flex-start;
      background: #F0F4F8;
      color: #4A4A6A;
      border-bottom-left-radius: 4px;
    }
    .chat-msg.typing::after {
      content: '...';
      animation: typing 1.2s infinite;
    }
    @keyframes typing {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    .chat-input-area {
      padding: 10px 14px;
      border-top: 1px solid rgba(0,0,0,0.06);
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .chat-input {
      flex: 1;
      border: none;
      background: #F7F8FA;
      padding: 10px 14px;
      border-radius: 20px;
      font-size: 13px;
      outline: none;
      color: #4A4A6A;
    }
    .chat-input::placeholder { color: #B0B0C0; }
    .chat-send {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #FF8FAB, #FFB7C5);
      border: none;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .chat-send:hover { opacity: 0.9; }
    .chat-send:disabled { opacity: 0.5; cursor: not-allowed; }

    .chat-actions {
      padding: 0 14px 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .chat-action-btn {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 12px;
      border: 1px solid rgba(255,143,171,0.3);
      background: rgba(255,143,171,0.08);
      color: #FF8FAB;
      cursor: pointer;
      text-decoration: none;
    }
    .chat-action-btn:hover { background: rgba(255,143,171,0.15); }

    /* Context Menu */
    #context-menu {
      position: fixed;
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      padding: 6px 0;
      display: none;
      z-index: 1000000;
      min-width: 140px;
    }
    #context-menu.show { display: block; }
    .ctx-item {
      padding: 10px 16px;
      font-size: 13px;
      color: #4A4A6A;
      cursor: pointer;
      transition: background 0.15s;
    }
    .ctx-item:hover { background: #FFF5F7; }

    /* Spin animation */
    .spinning { animation: spin 0.6s ease-in-out; }
    @keyframes spin {
      0% { transform: rotate(0deg) scale(1); }
      50% { transform: rotate(180deg) scale(1.2); }
      100% { transform: rotate(360deg) scale(1); }
    }

    /* Nurture Status */
    .nurture-status { padding: 8px 14px; border-top: 1px solid rgba(0,0,0,0.05); }
    .nurture-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .nurture-badge { font-size: 11px; font-weight: 700; color: #FF8FAB; background: rgba(255,143,171,0.12); padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
    .nurture-bar-label { font-size: 10px; color: #999; }
    .nurture-bar { width: 50px; height: 6px; background: #eee; border-radius: 3px; overflow: hidden; }
    .nurture-fill { height: 100%; background: linear-gradient(90deg, #FF8FAB, #FFB7C5); border-radius: 3px; transition: width 0.4s ease; }
    .nurture-fill.nurture-energy { background: linear-gradient(90deg, #87CEEB, #B0E0E6); }
  </style>
  <script src="../assets/js/pet-llm-bridge.js"></script>
  <script src="../assets/js/pet-memory.js"></script>
  <script src="../assets/js/pet-nurture.js"></script>
</head>
<body>
  <!-- Pet -->
  <div id="pet-container">
    <div class="pet-bubble" id="pet-bubble">你好呀~</div>
    <div class="pet-body" id="pet-body">
      <div class="pet-head" id="pet-head">
        <!-- Avatar or default SVG -->
      </div>
    </div>
  </div>

  <!-- Chat Panel -->
  <div id="chat-panel">
    <div class="chat-header">
      <span>🐱</span>
      <span id="pet-name">小Q</span>
      <span class="close-btn" id="chat-close">&times;</span>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="nurture-status" id="nurture-status">
      <div class="nurture-row">
        <span class="nurture-badge" id="nurture-badge">⭐ Lv.1</span>
        <span class="nurture-bar-label">饱食度</span>
        <div class="nurture-bar"><div class="nurture-fill" id="bar-satiety" style="width:100%"></div></div>
        <span class="nurture-bar-label">精力</span>
        <div class="nurture-bar"><div class="nurture-fill nurture-energy" id="bar-energy" style="width:100%"></div></div>
      </div>
    </div>
    <div class="chat-actions">
      <a class="chat-action-btn" href="solo-cn://open" target="_blank">🚀 TRAE</a>
      <button class="chat-action-btn" id="btn-feed">🍪 喂食</button>
      <button class="chat-action-btn" id="btn-play">🎾 玩耍</button>
      <button class="chat-action-btn" id="btn-rest">😴 休息</button>
      <button class="chat-action-btn" id="btn-pip">🔝 置顶</button>
    </div>
    <div class="chat-input-area">
      <input type="text" class="chat-input" id="chat-input" placeholder="和宠物聊聊天...">
      <button class="chat-send" id="chat-send">➤</button>
    </div>
  </div>

  <!-- Context Menu -->
  <div id="context-menu">
    <div class="ctx-item" id="ctx-hide">隐藏宠物</div>
    <div class="ctx-item" id="ctx-pip">置顶到桌面</div>
    <div class="ctx-item" id="ctx-close-panel">关闭对话</div>
  </div>

  <script>
    // Config from URL params
    const params = new URLSearchParams(location.search);
    const avatarPath = params.get('avatar') || './avatar.png';
    const personality = params.get('personality') || '活泼可爱';
    const apiKey = params.get('apiKey') || '';
    const apiBase = params.get('apiBase') || 'https://api.openai.com/v1';
    const petName = params.get('name') || '小Q';

    document.getElementById('pet-name').textContent = petName;

    // ===== 角色养成初始化 =====
    let petStats = PetNurture.load();
    function updateNurtureUI() {
      const s = PetNurture.getSummary(petStats);
      document.getElementById('nurture-badge').textContent = s.badge.icon + ' Lv.' + s.level;
      document.getElementById('bar-satiety').style.width = (petStats.satiety || 0) + '%';
      document.getElementById('bar-energy').style.width = (petStats.energy || 0) + '%';
    }
    updateNurtureUI();

    // Setup avatar
    const headEl = document.getElementById('pet-head');
    if (avatarPath) {
      headEl.innerHTML = `<img src="${avatarPath}" alt="avatar">`;
    } else {
      headEl.innerHTML = `
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="45" fill="#FF8FAB"/>
          <circle cx="35" cy="42" r="6" fill="#4A4A6A"/>
          <circle cx="65" cy="42" r="6" fill="#4A4A6A"/>
          <ellipse cx="50" cy="58" rx="8" ry="5" fill="#4A4A6A"/>
          <circle cx="28" cy="55" r="5" fill="#FFB7C5" opacity="0.5"/>
          <circle cx="72" cy="55" r="5" fill="#FFB7C5" opacity="0.5"/>
        </svg>`;
    }

    // Chat state
    const messages = [];
    let isTyping = false;

    function addMessage(text, sender) {
      const container = document.getElementById('chat-messages');
      const msg = document.createElement('div');
      msg.className = `chat-msg ${sender}`;
      msg.textContent = text;
      container.appendChild(msg);
      container.scrollTop = container.scrollHeight;
      messages.push({ role: sender === 'user' ? 'user' : 'assistant', content: text });
      // 持久化到 PetMemory
      PetMemory.add(sender === 'user' ? 'user' : 'assistant', text);
    }

    function showTyping() {
      const container = document.getElementById('chat-messages');
      const msg = document.createElement('div');
      msg.className = 'chat-msg pet typing';
      msg.id = 'typing-msg';
      msg.textContent = '思考中';
      container.appendChild(msg);
      container.scrollTop = container.scrollHeight;
      isTyping = true;
    }

    function hideTyping() {
      const el = document.getElementById('typing-msg');
      if (el) el.remove();
      isTyping = false;
    }

    async function sendChat(userText) {
      if (!userText.trim() || isTyping) return;
      addMessage(userText, 'user');
      PetNurture.chat(petStats);
      updateNurtureUI();

      const input = document.getElementById('chat-input');
      input.value = '';
      showTyping();

      // 构建 LLM 上下文（注入心情、人格、历史对话）
      const ctx = {
        petName,
        personality,
        mood: (typeof currentMood !== 'undefined') ? currentMood : 'happy',
        apiKey,
        apiBase,
        history: PetMemory.getRecent(10),
        stats: null
      };

      let replyText = '';
      const container = document.getElementById('chat-messages');

      try {
        for await (const chunk of LLMBridge.chat(userText, ctx)) {
          if (chunk.type === 'token') {
            replyText += chunk.content;
            // 复用或创建流式消息元素
            let msgEl = container.querySelector('.chat-msg.pet.streaming');
            if (!msgEl) {
              hideTyping();
              msgEl = document.createElement('div');
              msgEl.className = 'chat-msg pet streaming';
              container.appendChild(msgEl);
            }
            msgEl.textContent = replyText;
            container.scrollTop = container.scrollHeight;
          }
        }
        // 结束流式，移除标记
        const streamingEl = container.querySelector('.chat-msg.pet.streaming');
        if (streamingEl) streamingEl.classList.remove('streaming');
        // 保存到记忆
        if (replyText) PetMemory.add('assistant', replyText);
      } catch (e) {
        hideTyping();
        console.error('[sendChat] Error:', e);
        fallbackReply(userText);
      }
    }

    function fallbackReply(userText) {
      PetNurture.chat(petStats);
      updateNurtureUI();
      const text = userText.toLowerCase();
      const replies = [
        { keywords: ['你好', 'hi', 'hello'], reply: '你好呀！我是你的专属宠物 ' + petName + '~ 🎉' },
        { keywords: ['名字', '叫'], reply: '我叫 ' + petName + '，是你的 Q 版形象宠物哦~ 🐱' },
        { keywords: ['做什么', '功能'], reply: '我可以陪你聊天，还能帮你介绍 Q3D 的功能呢~ 🎨' },
        { keywords: ['可爱', '好看', '漂亮'], reply: '谢谢夸奖！你也很可爱呢~ 💕' },
        { keywords: [' joke', '笑话'], reply: '为什么程序员总是分不清圣诞节和万圣节？因为 Oct 31 == Dec 25！😄' },
        { keywords: ['bye', '再见', '拜拜'], reply: '再见啦！记得常来找我玩哦~ 👋' },
      ];
      for (const r of replies) {
        if (r.keywords.some(k => text.includes(k))) {
          typewriterReply(r.reply);
          return;
        }
      }
      typewriterReply('哇，这个话题好有趣！可以多跟我说说吗~ ✨');
    }

    function typewriterReply(text) {
      const container = document.getElementById('chat-messages');
      const msg = document.createElement('div');
      msg.className = 'chat-msg pet';
      container.appendChild(msg);

      let i = 0;
      const interval = setInterval(() => {
        msg.textContent = text.slice(0, i + 1);
        container.scrollTop = container.scrollHeight;
        i++;
        if (i >= text.length) {
          clearInterval(interval);
          messages.push({ role: 'assistant', content: text });
          PetMemory.add('assistant', text);
        }
      }, 30);
    }

    // Event listeners
    document.getElementById('chat-send').addEventListener('click', () => {
      sendChat(document.getElementById('chat-input').value);
    });
    document.getElementById('chat-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendChat(e.target.value);
    });
    document.getElementById('chat-close').addEventListener('click', () => {
      document.getElementById('chat-panel').classList.remove('open');
    });

    // 养成互动按钮
    document.getElementById('btn-feed').addEventListener('click', () => {
      PetNurture.feed(petStats);
      updateNurtureUI();
      showBubble('好吃~ 谢谢主人！🍪');
    });
    document.getElementById('btn-play').addEventListener('click', () => {
      const s = PetNurture.play(petStats);
      updateNurtureUI();
      if (s === petStats) {
        showBubble('太累了，让我休息一下吧... 😫');
      } else {
        showBubble('好开心！再来一次~ 🎾');
      }
    });
    document.getElementById('btn-rest').addEventListener('click', () => {
      PetNurture.rest(petStats);
      updateNurtureUI();
      showBubble('zzz... 充能中... 🔋');
    });

    // Pet interactions
    const petContainer = document.getElementById('pet-container');
    const petBody = document.getElementById('pet-body');

    petContainer.addEventListener('click', () => {
      document.getElementById('chat-panel').classList.toggle('open');
    });

    petContainer.addEventListener('dblclick', () => {
      petBody.classList.add('spinning');
      setTimeout(() => petBody.classList.remove('spinning'), 600);
      showBubble('旋转跳跃我闭着眼~ 🎵');
    });

    function showBubble(text) {
      const bubble = document.getElementById('pet-bubble');
      bubble.textContent = text;
      bubble.classList.add('show');
      setTimeout(() => bubble.classList.remove('show'), 3000);
    }

    // Show greeting bubble on load
    setTimeout(() => showBubble(`你好呀，我是${petName}~`), 500);

    // ===== 增强拖拽：物理惯性 + 边缘吸附 + 自动漫游 =====
    let isDragging = false, dragOffsetX = 0, dragOffsetY = 0;
    let velocityX = 0, velocityY = 0;
    let lastMouseX = 0, lastMouseY = 0, lastMouseTime = 0;
    let roamTimer = null, isRoaming = false, roamRAF = null;

    petContainer.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      isDragging = true;
      dragOffsetX = e.clientX - petContainer.offsetLeft;
      dragOffsetY = e.clientY - petContainer.offsetTop;
      petContainer.classList.add('dragging');
      stopRoaming();
      lastMouseX = e.clientX; lastMouseY = e.clientY;
      lastMouseTime = Date.now();
      velocityX = 0; velocityY = 0;
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const now = Date.now();
      const dt = now - lastMouseTime;
      if (dt > 0) {
        velocityX = (e.clientX - lastMouseX) / dt * 16;
        velocityY = (e.clientY - lastMouseY) / dt * 16;
      }
      lastMouseX = e.clientX; lastMouseY = e.clientY; lastMouseTime = now;

      let nx = e.clientX - dragOffsetX;
      let ny = e.clientY - dragOffsetY;
      const maxX = window.innerWidth - petContainer.offsetWidth;
      const maxY = window.innerHeight - petContainer.offsetHeight;
      nx = Math.max(0, Math.min(nx, maxX));
      ny = Math.max(0, Math.min(ny, maxY));
      petContainer.style.left = nx + 'px';
      petContainer.style.top = ny + 'px';
      petContainer.style.bottom = 'auto';
      petContainer.style.right = 'auto';
    });

    document.addEventListener('mouseup', () => {
      if (!isDragging) return;
      isDragging = false;
      petContainer.classList.remove('dragging');
      if (Math.abs(velocityX) > 2 || Math.abs(velocityY) > 2) {
        applyInertia();
      } else {
        snapToEdge();
        startRoamingTimer();
      }
    });

    function applyInertia() {
      let x = petContainer.offsetLeft, y = petContainer.offsetTop;
      const friction = 0.92, minVelocity = 0.5;
      function step() {
        if (isDragging || isRoaming) return;
        x += velocityX; y += velocityY;
        velocityX *= friction; velocityY *= friction;
        const maxX = window.innerWidth - petContainer.offsetWidth;
        const maxY = window.innerHeight - petContainer.offsetHeight;
        if (x < 0) { x = 0; velocityX *= -0.5; }
        if (x > maxX) { x = maxX; velocityX *= -0.5; }
        if (y < 0) { y = 0; velocityY *= -0.5; }
        if (y > maxY) { y = maxY; velocityY *= -0.5; }
        petContainer.style.left = x + 'px'; petContainer.style.top = y + 'px';
        petContainer.style.bottom = 'auto'; petContainer.style.right = 'auto';
        if (Math.abs(velocityX) > minVelocity || Math.abs(velocityY) > minVelocity) {
          requestAnimationFrame(step);
        } else { snapToEdge(); startRoamingTimer(); }
      }
      requestAnimationFrame(step);
    }

    function snapToEdge() {
      const rect = petContainer.getBoundingClientRect();
      const snapDist = 80, pad = 10;
      let nx = rect.left, ny = rect.top, shouldSnap = false;
      if (nx < snapDist) { nx = pad; shouldSnap = true; }
      else if (nx > window.innerWidth - rect.width - snapDist) { nx = window.innerWidth - rect.width - pad; shouldSnap = true; }
      if (ny < snapDist) { ny = pad; shouldSnap = true; }
      else if (ny > window.innerHeight - rect.height - snapDist) { ny = window.innerHeight - rect.height - pad; shouldSnap = true; }
      if (shouldSnap) {
        petContainer.style.transition = 'left 0.4s cubic-bezier(0.34,1.56,0.64,1), top 0.4s cubic-bezier(0.34,1.56,0.64,1)';
        petContainer.style.left = nx + 'px'; petContainer.style.top = ny + 'px';
        setTimeout(() => { petContainer.style.transition = 'transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1)'; }, 400);
      }
    }

    function startRoamingTimer() {
      if (roamTimer) clearTimeout(roamTimer);
      roamTimer = setTimeout(() => startRoaming(), 15000);
    }
    function stopRoaming() {
      if (roamTimer) { clearTimeout(roamTimer); roamTimer = null; }
      if (roamRAF) { cancelAnimationFrame(roamRAF); roamRAF = null; }
      isRoaming = false;
    }
    function startRoaming() {
      if (isDragging || document.getElementById('chat-panel').classList.contains('open')) {
        startRoamingTimer(); return;
      }
      isRoaming = true;
      const maxX = window.innerWidth - petContainer.offsetWidth - 20;
      const maxY = window.innerHeight - petContainer.offsetHeight - 20;
      const targetX = 20 + Math.random() * (maxX - 20);
      const targetY = 20 + Math.random() * (maxY - 20);
      const startX = petContainer.offsetLeft, startY = petContainer.offsetTop;
      const duration = 3000 + Math.random() * 4000;
      const startTime = performance.now();
      function step(now) {
        if (!isRoaming || isDragging) return;
        const t = Math.min((now - startTime) / duration, 1);
        const ease = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
        petContainer.style.left = (startX + (targetX - startX) * ease) + 'px';
        petContainer.style.top = (startY + (targetY - startY) * ease) + 'px';
        petContainer.style.bottom = 'auto'; petContainer.style.right = 'auto';
        if (t < 1) { roamRAF = requestAnimationFrame(step); }
        else { isRoaming = false; startRoamingTimer(); }
      }
      roamRAF = requestAnimationFrame(step);
    }
    startRoamingTimer();

    // Context menu
    const ctxMenu = document.getElementById('context-menu');
    petContainer.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      ctxMenu.style.left = e.clientX + 'px';
      ctxMenu.style.top = e.clientY + 'px';
      ctxMenu.classList.add('show');
    });
    document.addEventListener('click', () => ctxMenu.classList.remove('show'));

    document.getElementById('ctx-hide').addEventListener('click', () => {
      petContainer.style.display = 'none';
      document.getElementById('chat-panel').classList.remove('open');
    });
    document.getElementById('ctx-close-panel').addEventListener('click', () => {
      document.getElementById('chat-panel').classList.remove('open');
    });

    // PiP
    document.getElementById('btn-pip').addEventListener('click', enablePiP);
    document.getElementById('ctx-pip').addEventListener('click', enablePiP);

    async function enablePiP() {
      if ('documentPictureInPicture' in window) {
        try {
          const pipWindow = await documentPictureInPicture.requestWindow({
            width: 200,
            height: 280,
          });
          // Clone pet into PiP window
          const clone = petContainer.cloneNode(true);
          clone.style.position = 'static';
          clone.style.bottom = 'auto';
          clone.style.right = 'auto';
          pipWindow.document.body.appendChild(clone);
          pipWindow.document.body.style.background = 'transparent';
          pipWindow.document.body.style.margin = '0';
          // Copy styles
          const styles = document.querySelectorAll('style');
          styles.forEach(s => {
            const ns = pipWindow.document.createElement('style');
            ns.textContent = s.textContent;
            pipWindow.document.head.appendChild(ns);
          });
        } catch (e) {
          alert('PiP 置顶需要 Chrome/Edge 116+');
        }
      } else {
        alert('你的浏览器不支持 Document PiP，请使用 Chrome/Edge 116+');
      }
    }
  </script>
</body>
</html>
