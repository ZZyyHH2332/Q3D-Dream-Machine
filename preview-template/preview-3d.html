<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Q3D 3D 预览</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background: linear-gradient(135deg, #FFF5F7, #F0F9FF);
      font-family: 'Noto Sans SC', sans-serif;
    }
    #canvas-container {
      width: 100vw;
      height: 100vh;
    }
    .overlay {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      padding: 12px 24px;
      border-radius: 9999px;
      box-shadow: 0 8px 32px rgba(255,143,171,0.15);
      color: #4A4A6A;
      font-size: 14px;
      pointer-events: none;
      user-select: none;
    }
    .mood-bar {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      padding: 8px 16px;
      border-radius: 9999px;
      box-shadow: 0 4px 20px rgba(255,143,171,0.15);
      display: flex;
      gap: 6px;
      z-index: 100;
    }
    .mood-btn {
      padding: 6px 14px;
      border: none;
      border-radius: 9999px;
      background: #FFF0F5;
      color: #FF6B9D;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .mood-btn:hover {
      background: #FF8FAB;
      color: white;
      transform: scale(1.05);
    }
    .mood-btn.active {
      background: linear-gradient(135deg, #FF8FAB, #FFB7C5);
      color: white;
    }
    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #FF8FAB;
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .loading::after {
      content: '';
      width: 20px;
      height: 20px;
      border: 2px solid #FF8FAB;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="loading" class="loading">加载 3D 场景中...</div>
  <div id="canvas-container"></div>
  <div class="overlay">🖱️ 拖拽旋转查看不同角度</div>
  <div class="mood-bar" id="moodBar">
    <button class="mood-btn active" data-mood="idle">平静</button>
    <button class="mood-btn" data-mood="happy">开心</button>
    <button class="mood-btn" data-mood="excited">兴奋</button>
    <button class="mood-btn" data-mood="sleeping">困倦</button>
    <button class="mood-btn" data-mood="curious">好奇</button>
    <button class="mood-btn" data-mood="sad">难过</button>
    <button class="mood-btn" data-mood="love">喜爱</button>
    <button class="mood-btn" data-mood="climbing">攀爬</button>
    <button class="mood-btn" data-mood="crawling_upside">倒挂</button>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { OutlinePass } from 'three/addons/postprocessing/OutlinePass.js';
    import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
    import { FXAAShader } from 'three/addons/shaders/FXAAShader.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
    import { createBonesCharacter, AVAILABLE_MOODS } from './js/character-bones.js';

    const params = new URLSearchParams(location.search);
    const avatarPath = params.get('avatar') || null;
    const glbPath = params.get('model') || null;
    const mood = params.get('mood') || 'idle';
    const useBones = params.get('bones') !== 'false'; // 默认启用骨骼角色

    // Toon gradient helper
    function createToonGradientMap(levels) {
      const data = new Uint8Array(levels);
      for (let i = 0; i < levels; i++) {
        data[i] = Math.round((i / (levels - 1)) * 255);
      }
      const texture = new THREE.DataTexture(data, levels, 1, THREE.RedFormat);
      texture.minFilter = THREE.NearestFilter;
      texture.magFilter = THREE.NearestFilter;
      texture.needsUpdate = true;
      return texture;
    }
    const gradientMap = createToonGradientMap(3);

    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xFFF5F7);
    scene.fog = new THREE.Fog(0xFFF5F7, 8, 20);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(3, 2, 4);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.SoftShadowMap;
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // Controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 2;
    controls.maxDistance = 10;
    controls.target.set(0, 0.5, 0);

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 8, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 1024;
    dirLight.shadow.mapSize.height = 1024;
    scene.add(dirLight);

    const fillLight = new THREE.DirectionalLight(0xFFB7C5, 0.3);
    fillLight.position.set(-3, 2, -3);
    scene.add(fillLight);

    // Character group
    const character = new THREE.Group();
    scene.add(character);

    // Build geometric character (fallback / default)
    function buildGeometricCharacter(avatarTexture) {
      // Head (sphere)
      let headMaterial;
      if (avatarTexture) {
        headMaterial = new THREE.MeshToonMaterial({ map: avatarTexture, gradientMap });
      } else {
        headMaterial = new THREE.MeshToonMaterial({ color: 0xFF8FAB, gradientMap });
      }
      const headGeo = new THREE.SphereGeometry(1.0, 32, 32);
      const head = new THREE.Mesh(headGeo, headMaterial);
      head.position.y = 1.6;
      head.castShadow = true;
      character.add(head);

      // Body (cylinder)
      const bodyGeo = new THREE.CylinderGeometry(0.6, 0.7, 1.2, 32);
      const bodyMat = new THREE.MeshToonMaterial({ color: 0xA8E6CF, gradientMap });
      const body = new THREE.Mesh(bodyGeo, bodyMat);
      body.position.y = 0.4;
      body.castShadow = true;
      character.add(body);

      // Arms (spheres)
      const armGeo = new THREE.SphereGeometry(0.25, 16, 16);
      const armMat = new THREE.MeshToonMaterial({ color: 0xFFD93D, gradientMap });
      const leftArm = new THREE.Mesh(armGeo, armMat);
      leftArm.position.set(-0.9, 0.7, 0);
      leftArm.castShadow = true;
      character.add(leftArm);
      const rightArm = new THREE.Mesh(armGeo, armMat);
      rightArm.position.set(0.9, 0.7, 0);
      rightArm.castShadow = true;
      character.add(rightArm);

      // Legs (cylinders)
      const legGeo = new THREE.CylinderGeometry(0.2, 0.22, 0.5, 16);
      const legMat = new THREE.MeshToonMaterial({ color: 0xB4D7F0, gradientMap });
      const leftLeg = new THREE.Mesh(legGeo, legMat);
      leftLeg.position.set(-0.3, -0.45, 0);
      leftLeg.castShadow = true;
      character.add(leftLeg);
      const rightLeg = new THREE.Mesh(legGeo, legMat);
      rightLeg.position.set(0.3, -0.45, 0);
      rightLeg.castShadow = true;
      character.add(rightLeg);
    }

    // Build bones character (new skeletal animation system)
    let bonesChar = null;
    function buildBonesCharacter(avatarTexture) {
      try {
        bonesChar = createBonesCharacter(THREE, avatarTexture, { gradientMap });
        character.add(bonesChar.group);
        bonesChar.setMood(mood);
        // 更新 outline 选中对象
        outlinePass.selectedObjects = [bonesChar.group];
        return true;
      } catch (e) {
        console.warn('Bones character failed, falling back to geometric:', e.message);
        return false;
      }
    }

    // Ground shadow
    const groundGeo = new THREE.CircleGeometry(2, 64);
    const groundMat = new THREE.MeshToonMaterial({ color: 0xFFFFFF, gradientMap });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.7;
    ground.receiveShadow = true;
    scene.add(ground);

    // Floating particles
    const particlesGeo = new THREE.BufferGeometry();
    const particleCount = 30;
    const posArray = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount * 3; i++) {
      posArray[i] = (Math.random() - 0.5) * 8;
    }
    particlesGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
    const particlesMat = new THREE.PointsMaterial({
      size: 0.05,
      color: 0xFF8FAB,
      transparent: true,
      opacity: 0.6,
    });
    const particles = new THREE.Points(particlesGeo, particlesMat);
    scene.add(particles);

    // Post-processing
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));

    const outlinePass = new OutlinePass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
      scene, camera
    );
    outlinePass.edgeStrength = 3.0;
    outlinePass.edgeGlow = 1.0;
    outlinePass.edgeThickness = 1.0;
    outlinePass.pulsePeriod = 0;
    outlinePass.visibleEdgeColor.set(0x333333);
    outlinePass.hiddenEdgeColor.set(0x333333);
    outlinePass.selectedObjects = [character];
    composer.addPass(outlinePass);

    const fxaaPass = new ShaderPass(FXAAShader);
    fxaaPass.uniforms['resolution'].value.set(1 / window.innerWidth, 1 / window.innerHeight);
    composer.addPass(fxaaPass);

    // Hide loading helper
    function hideLoading() {
      document.getElementById('loading').style.display = 'none';
    }

    // GLB model loading with fallback
    if (glbPath) {
      const dracoLoader = new DRACOLoader();
      dracoLoader.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/');
      const gltfLoader = new GLTFLoader();
      gltfLoader.setDRACOLoader(dracoLoader);

      gltfLoader.load(glbPath, (gltf) => {
        const model = gltf.scene;
        // Auto-scale model to fit
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 2.0 / maxDim;
        model.scale.setScalar(scale);
        // Center the model
        const scaledBox = new THREE.Box3().setFromObject(model);
        const center = scaledBox.getCenter(new THREE.Vector3());
        model.position.sub(center);
        model.position.y += 0.5;
        character.add(model);
        hideLoading();
      }, undefined, () => {
        // GLB load failed, fallback to bones character or geometric
        buildCharacterWithFallback();
      });
    } else {
      // No model param, build bones character (with optional avatar texture)
      buildCharacterWithFallback();
    }

    function buildCharacterWithFallback() {
      if (avatarPath) {
        const textureLoader = new THREE.TextureLoader();
        const texture = textureLoader.load(
          avatarPath,
          () => {
            texture.colorSpace = THREE.SRGBColorSpace;
            // 优先尝试骨骼角色
            if (useBones && buildBonesCharacter(texture)) {
              hideLoading();
              return;
            }
            // 降级到几何角色
            buildGeometricCharacter(texture);
            hideLoading();
          },
          undefined,
          () => {
            // 纹理加载失败
            if (useBones && buildBonesCharacter(null)) {
              hideLoading();
              return;
            }
            buildGeometricCharacter(null);
            hideLoading();
          }
        );
      } else {
        if (useBones && buildBonesCharacter(null)) {
          hideLoading();
          return;
        }
        buildGeometricCharacter(null);
        hideLoading();
      }
    }

    // Animation
    function animate() {
      requestAnimationFrame(animate);

      // 骨骼角色动画（如果存在）
      if (bonesChar) {
        bonesChar.update();
      }

      character.rotation.y += 0.005;

      // Bobbing animation (仅几何角色使用，骨骼角色有自己的动画)
      if (!bonesChar) {
        character.position.y = Math.sin(Date.now() * 0.002) * 0.05;
      }

      // Particle float
      particles.rotation.y += 0.001;

      controls.update();
      composer.render();
    }
    animate();

    // Resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
      fxaaPass.uniforms['resolution'].value.set(1 / window.innerWidth, 1 / window.innerHeight);
    });

    // Mood switcher
    const moodButtons = document.querySelectorAll('.mood-btn');
    moodButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        const moodName = btn.dataset.mood;
        moodButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (bonesChar) {
          bonesChar.setMood(moodName);
        }
      });
    });

    // 暴露 setMood 到全局，方便外部调用
    window.setCharacterMood = function(moodName) {
      if (bonesChar) {
        bonesChar.setMood(moodName);
        moodButtons.forEach(b => {
          b.classList.toggle('active', b.dataset.mood === moodName);
        });
      }
    };
  </script>
</body>
</html>
