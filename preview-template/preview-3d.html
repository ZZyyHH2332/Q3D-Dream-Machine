<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Q3D 3D 预览</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background: linear-gradient(135deg, #FFF5F7, #F0F9FF);
      font-family: 'Noto Sans SC', sans-serif;
    }
    #canvas-container {
      width: 100vw;
      height: 100vh;
    }
    .overlay {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      padding: 12px 24px;
      border-radius: 9999px;
      box-shadow: 0 8px 32px rgba(255,143,171,0.15);
      color: #4A4A6A;
      font-size: 14px;
      pointer-events: none;
      user-select: none;
    }
    .mood-bar {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      padding: 8px 16px;
      border-radius: 9999px;
      box-shadow: 0 4px 20px rgba(255,143,171,0.15);
      display: flex;
      gap: 6px;
      z-index: 100;
    }
    .mood-btn {
      padding: 6px 14px;
      border: none;
      border-radius: 9999px;
      background: #FFF0F5;
      color: #FF6B9D;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .mood-btn:hover {
      background: #FF8FAB;
      color: white;
      transform: scale(1.05);
    }
    .mood-btn.active {
      background: linear-gradient(135deg, #FF8FAB, #FFB7C5);
      color: white;
    }
    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #FF8FAB;
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .loading::after {
      content: '';
      width: 20px;
      height: 20px;
      border: 2px solid #FF8FAB;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .quality-badge {
      position: fixed;
      top: 70px;
      right: 20px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 11px;
      color: #888;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="loading" class="loading">加载 3D 场景中...</div>
  <div id="canvas-container"></div>
  <div class="overlay">🖱️ 拖拽旋转查看不同角度</div>
  <div class="quality-badge" id="qualityBadge">PBR + HDRI + ACES</div>
  <div class="mood-bar" id="moodBar">
    <button class="mood-btn active" data-mood="idle">平静</button>
    <button class="mood-btn" data-mood="happy">开心</button>
    <button class="mood-btn" data-mood="excited">兴奋</button>
    <button class="mood-btn" data-mood="sleeping">困倦</button>
    <button class="mood-btn" data-mood="curious">好奇</button>
    <button class="mood-btn" data-mood="sad">难过</button>
    <button class="mood-btn" data-mood="love">喜爱</button>
    <button class="mood-btn" data-mood="climbing">攀爬</button>
    <button class="mood-btn" data-mood="crawling_upside">倒挂</button>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { OutlinePass } from 'three/addons/postprocessing/OutlinePass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { SAOPass } from 'three/addons/postprocessing/SAOPass.js';
    import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
    import { FXAAShader } from 'three/addons/shaders/FXAAShader.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
    import { createBonesCharacter, AVAILABLE_MOODS } from './js/character-bones.js';
    import { createGLBAnimator } from './js/character-glb-animator.js';

    const params = new URLSearchParams(location.search);
    const avatarPath = params.get('avatar') || null;
    const glbPath = params.get('model') || null;
    const mood = params.get('mood') || 'idle';
    const useBones = params.get('bones') !== 'false';

    // ========== RENDERER (PBR-grade) ==========
    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      powerPreference: 'high-performance',
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // ========== SCENE ==========
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xFFF5F7);
    scene.fog = new THREE.Fog(0xFFF5F7, 10, 25);

    // ========== HDRI ENVIRONMENT MAP (RoomEnvironment) ==========
    const pmremGenerator = new THREE.PMREMGenerator(renderer);
    pmremGenerator.compileEquirectangularShader();
    const roomEnv = new RoomEnvironment();
    const envTexture = pmremGenerator.fromScene(roomEnv, 0.04).texture;
    scene.environment = envTexture;
    roomEnv.dispose();

    // ========== CAMERA ==========
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(3, 2, 4);

    // ========== CONTROLS ==========
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 2;
    controls.maxDistance = 10;
    controls.target.set(0, 0.5, 0);

    // ========== LIGHTING (Studio-grade) ==========
    // Key light (warm, strong)
    const keyLight = new THREE.DirectionalLight(0xFFF5E6, 1.2);
    keyLight.position.set(5, 8, 5);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.width = 2048;
    keyLight.shadow.mapSize.height = 2048;
    keyLight.shadow.camera.near = 0.5;
    keyLight.shadow.camera.far = 20;
    keyLight.shadow.camera.left = -5;
    keyLight.shadow.camera.right = 5;
    keyLight.shadow.camera.top = 5;
    keyLight.shadow.camera.bottom = -5;
    keyLight.shadow.bias = -0.0005;
    keyLight.shadow.normalBias = 0.02;
    scene.add(keyLight);

    // Fill light (cool, soft)
    const fillLight = new THREE.DirectionalLight(0xE6F0FF, 0.4);
    fillLight.position.set(-4, 3, -3);
    scene.add(fillLight);

    // Rim light (accent)
    const rimLight = new THREE.DirectionalLight(0xFFB7C5, 0.5);
    rimLight.position.set(-2, 4, 5);
    scene.add(rimLight);

    // Ambient (reduced — environment map provides base illumination)
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambientLight);

    // ========== CHARACTER GROUP ==========
    const character = new THREE.Group();
    scene.add(character);

    // ========== TOON GRADIENT (for geometric fallback) ==========
    function createToonGradientMap(levels) {
      const data = new Uint8Array(levels);
      for (let i = 0; i < levels; i++) {
        data[i] = Math.round((i / (levels - 1)) * 255);
      }
      const texture = new THREE.DataTexture(data, levels, 1, THREE.RedFormat);
      texture.minFilter = THREE.NearestFilter;
      texture.magFilter = THREE.NearestFilter;
      texture.needsUpdate = true;
      return texture;
    }
    const gradientMap = createToonGradientMap(3);

    // ========== GROUND (PBR) ==========
    const groundGeo = new THREE.CircleGeometry(3, 64);
    const groundMat = new THREE.MeshStandardMaterial({
      color: 0xFFFFFF,
      roughness: 0.8,
      metalness: 0.0,
      envMapIntensity: 0.3,
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.7;
    ground.receiveShadow = true;
    scene.add(ground);

    // ========== FLOATING PARTICLES ==========
    const particlesGeo = new THREE.BufferGeometry();
    const particleCount = 40;
    const posArray = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount * 3; i++) {
      posArray[i] = (Math.random() - 0.5) * 8;
    }
    particlesGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
    const particlesMat = new THREE.PointsMaterial({
      size: 0.04,
      color: 0xFF8FAB,
      transparent: true,
      opacity: 0.5,
      sizeAttenuation: true,
    });
    const particles = new THREE.Points(particlesGeo, particlesMat);
    scene.add(particles);

    // ========== POST-PROCESSING PIPELINE ==========
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));

    // SAO (Screen Space Ambient Occlusion) — adds depth
    const saoPass = new SAOPass(scene, camera, false, true);
    saoPass.params.saoBias = 0.5;
    saoPass.params.saoIntensity = 0.015;
    saoPass.params.saoScale = 4;
    saoPass.params.saoKernelRadius = 30;
    saoPass.params.saoMinResolution = 0;
    saoPass.params.saoBlur = true;
    saoPass.params.saoBlurRadius = 4;
    saoPass.params.saoBlurStdDev = 3;
    saoPass.params.saoBlurDepthCutoff = 0.01;
    composer.addPass(saoPass);

    // Outline (character silhouette)
    const outlinePass = new OutlinePass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
      scene, camera
    );
    outlinePass.edgeStrength = 2.5;
    outlinePass.edgeGlow = 0.8;
    outlinePass.edgeThickness = 1.0;
    outlinePass.pulsePeriod = 0;
    outlinePass.visibleEdgeColor.set(0x444444);
    outlinePass.hiddenEdgeColor.set(0x444444);
    outlinePass.selectedObjects = [character];
    composer.addPass(outlinePass);

    // Bloom (subtle glow)
    const bloomPass = new UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
      0.15,  // strength
      0.4,   // radius
      0.85   // threshold
    );
    composer.addPass(bloomPass);

    // FXAA (anti-aliasing)
    const fxaaPass = new ShaderPass(FXAAShader);
    fxaaPass.uniforms['resolution'].value.set(1 / window.innerWidth, 1 / window.innerHeight);
    composer.addPass(fxaaPass);

    // ========== GEOMETRIC CHARACTER (fallback) ==========
    function buildGeometricCharacter(avatarTexture) {
      let headMaterial;
      if (avatarTexture) {
        headMaterial = new THREE.MeshToonMaterial({ map: avatarTexture, gradientMap });
      } else {
        headMaterial = new THREE.MeshToonMaterial({ color: 0xFF8FAB, gradientMap });
      }
      const headGeo = new THREE.SphereGeometry(1.0, 32, 32);
      const head = new THREE.Mesh(headGeo, headMaterial);
      head.position.y = 1.6;
      head.castShadow = true;
      character.add(head);

      const bodyGeo = new THREE.CylinderGeometry(0.6, 0.7, 1.2, 32);
      const bodyMat = new THREE.MeshToonMaterial({ color: 0xA8E6CF, gradientMap });
      const body = new THREE.Mesh(bodyGeo, bodyMat);
      body.position.y = 0.4;
      body.castShadow = true;
      character.add(body);

      const armGeo = new THREE.SphereGeometry(0.25, 16, 16);
      const armMat = new THREE.MeshToonMaterial({ color: 0xFFD93D, gradientMap });
      const leftArm = new THREE.Mesh(armGeo, armMat);
      leftArm.position.set(-0.9, 0.7, 0);
      leftArm.castShadow = true;
      character.add(leftArm);
      const rightArm = new THREE.Mesh(armGeo, armMat);
      rightArm.position.set(0.9, 0.7, 0);
      rightArm.castShadow = true;
      character.add(rightArm);

      const legGeo = new THREE.CylinderGeometry(0.2, 0.22, 0.5, 16);
      const legMat = new THREE.MeshToonMaterial({ color: 0xB4D7F0, gradientMap });
      const leftLeg = new THREE.Mesh(legGeo, legMat);
      leftLeg.position.set(-0.3, -0.45, 0);
      leftLeg.castShadow = true;
      character.add(leftLeg);
      const rightLeg = new THREE.Mesh(legGeo, legMat);
      rightLeg.position.set(0.3, -0.45, 0);
      rightLeg.castShadow = true;
      character.add(rightLeg);
    }

    // ========== BONES CHARACTER ==========
    let bonesChar = null;
    function buildBonesCharacter(avatarTexture) {
      try {
        bonesChar = createBonesCharacter(THREE, avatarTexture, { gradientMap });
        character.add(bonesChar.group);
        bonesChar.setMood(mood);
        outlinePass.selectedObjects = [bonesChar.group];
        return true;
      } catch (e) {
        console.warn('Bones character failed, falling back to geometric:', e.message);
        return false;
      }
    }

    // ========== GLB MODEL LOADING (PBR pipeline + GLB Animator) ==========
    let glbAnimator = null;

    function loadGLBModel(url) {
      const dracoLoader = new DRACOLoader();
      dracoLoader.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/');
      const gltfLoader = new GLTFLoader();
      gltfLoader.setDRACOLoader(dracoLoader);

      gltfLoader.load(url, (gltf) => {
        const model = gltf.scene;

        // Enhance PBR materials for environment lighting
        model.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
            if (child.material) {
              if (child.material.isMeshStandardMaterial || child.material.isMeshPhysicalMaterial) {
                child.material.envMapIntensity = 1.0;
                child.material.needsUpdate = true;
              }
            }
          }
        });

        // Auto-scale to fit viewport
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 2.0 / maxDim;
        model.scale.setScalar(scale);

        // Center the model
        const scaledBox = new THREE.Box3().setFromObject(model);
        const center = scaledBox.getCenter(new THREE.Vector3());
        model.position.sub(center);
        model.position.y += 0.5;

        // Create GLB animator (auto-segments parts for animation)
        glbAnimator = createGLBAnimator(THREE, model);
        character.add(glbAnimator.group);
        glbAnimator.setMood(mood);
        outlinePass.selectedObjects = [glbAnimator.group];

        // Update quality badge
        const segLabel = glbAnimator.isSegmented ? 'Segmented' : 'Whole';
        const badge = document.getElementById('qualityBadge');
        if (badge) badge.textContent = `PBR + HDRI + ACES | GLB ${segLabel}`;

        hideLoading();
      }, undefined, () => {
        // GLB load failed, fallback
        buildCharacterWithFallback();
      });
    }

    // ========== LOADING ==========
    function hideLoading() {
      document.getElementById('loading').style.display = 'none';
    }

    // ========== MAIN ENTRY ==========
    if (glbPath) {
      loadGLBModel(glbPath);
    } else {
      buildCharacterWithFallback();
    }

    function buildCharacterWithFallback() {
      if (avatarPath) {
        const textureLoader = new THREE.TextureLoader();
        const texture = textureLoader.load(
          avatarPath,
          () => {
            texture.colorSpace = THREE.SRGBColorSpace;
            if (useBones && buildBonesCharacter(texture)) {
              hideLoading();
              return;
            }
            buildGeometricCharacter(texture);
            hideLoading();
          },
          undefined,
          () => {
            if (useBones && buildBonesCharacter(null)) {
              hideLoading();
              return;
            }
            buildGeometricCharacter(null);
            hideLoading();
          }
        );
      } else {
        if (useBones && buildBonesCharacter(null)) {
          hideLoading();
          return;
        }
        buildGeometricCharacter(null);
        hideLoading();
      }
    }

    // ========== ANIMATION LOOP ==========
    function animate() {
      requestAnimationFrame(animate);

      if (bonesChar) {
        bonesChar.update();
      }
      if (glbAnimator) {
        glbAnimator.update();
      }

      character.rotation.y += 0.005;

      if (!bonesChar && !glbAnimator) {
        character.position.y = Math.sin(Date.now() * 0.002) * 0.05;
      }

      particles.rotation.y += 0.001;

      controls.update();
      composer.render();
    }
    animate();

    // ========== RESIZE ==========
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
      fxaaPass.uniforms['resolution'].value.set(1 / window.innerWidth, 1 / window.innerHeight);
    });

    // ========== MOOD SWITCHER ==========
    const moodButtons = document.querySelectorAll('.mood-btn');
    moodButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        const moodName = btn.dataset.mood;
        moodButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (bonesChar) bonesChar.setMood(moodName);
        if (glbAnimator) glbAnimator.setMood(moodName);
      });
    });

    window.setCharacterMood = function(moodName) {
      if (bonesChar) {
        bonesChar.setMood(moodName);
      }
      if (glbAnimator) {
        glbAnimator.setMood(moodName);
      }
      moodButtons.forEach(b => {
        b.classList.toggle('active', b.dataset.mood === moodName);
      });
    };
  </script>
</body>
</html>
